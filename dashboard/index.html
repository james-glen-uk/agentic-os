<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic OS</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agentic OS">
<meta name="theme-color" content="#d97757">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="topLoadingBar"></div>

  <header id="titlebar">
    <div class="titlebar-brand" onclick="navigate('dashboard')" title="Go to Dashboard">
      <span class="titlebar-badge"><svg width="15" height="15" viewBox="0 0 24 24"><mask id="tbMoon"><rect width="24" height="24" fill="#000"/><circle cx="12" cy="12" r="10.08" fill="#fff"/><circle cx="17.28" cy="12" r="10.56" fill="#000"/></mask><rect width="24" height="24" fill="currentColor" mask="url(#tbMoon)"/></svg></span>
      <span class="titlebar-name">Agentic OS</span>
      <span class="titlebar-version">v2.0</span>
    </div>
    <div class="titlebar-actions">
      <button class="titlebar-icon-btn" onclick="focusGlobalSearch()" title="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </button>
      <button class="titlebar-icon-btn" onclick="toggleRightPanel()" title="Toggle background tasks panel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
      </button>
      <button class="titlebar-icon-btn" id="voiceMicBtn" onclick="toggleVoiceCapture()" title="Voice command">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg>
      </button>
    </div>
    <div class="titlebar-spacer"></div>
    <div class="titlebar-status">
      <span class="titlebar-status-dot" id="titlebarAgentDot"></span>
      <span id="titlebarAgentText">Connecting…</span>
      <span class="titlebar-host mono" id="titlebarHost"></span>
    </div>
    <div class="titlebar-winbtns">
      <button class="titlebar-winbtn" title="Minimize"><svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1"><line x1="1" y1="6" x2="11" y2="6"/></svg></button>
      <button class="titlebar-winbtn" title="Maximize"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1"><rect x="1.5" y="1.5" width="9" height="9"/></svg></button>
      <button class="titlebar-winbtn" title="Close"><svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" stroke-width="1.1"><line x1="1.5" y1="1.5" x2="10.5" y2="10.5"/><line x1="10.5" y1="1.5" x2="1.5" y2="10.5"/></svg></button>
    </div>
  </header>

  <div id="shell">
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-nav" id="sidebarNav"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user" onclick="toggleSidebar()" title="Collapse sidebar">
          <div class="sidebar-avatar">JG</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">James Glen</div>
            <div class="sidebar-user-role">Operator · local</div>
          </div>
          <svg class="sidebar-user-chevron" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
    </nav>

    <aside id="secondarySidebar" class="secondary-sidebar" hidden>
      <div class="secondary-header">
        <span class="secondary-title" id="secondaryTitle"></span>
        <span class="secondary-newlink" id="secondaryNewLink" style="display:none"></span>
        <svg class="secondary-collapse" onclick="toggleSecondarySidebar()" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" title="Collapse"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="secondary-search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <span>Search…</span>
      </div>
      <div class="secondary-list" id="secondaryList"></div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <span class="topbar-title" id="pageTitle">Dashboard</span>
          <span class="topbar-breadcrumb" id="pageBreadcrumb">Overview</span>
        </div>
        <div class="topbar-right">
          <div class="topbar-search">
            <span>🔍</span>
            <input type="text" placeholder="Search skills..." id="globalSearch" oninput="handleGlobalSearch(this.value)">
          </div>
        </div>
      </div>
      <div id="pageContent" class="page-content">
        <div class="loading"><div class="loading-spinner"></div><span>Loading Agentic OS...</span></div>
      </div>
    </main>

    <aside id="rightPanel" class="right-panel" hidden>
      <div class="rightpanel-header">
        <span class="rightpanel-title">Background tasks</span>
        <svg onclick="toggleRightPanel()" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="cursor:pointer" title="Close"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
      </div>
      <div class="rightpanel-body" id="rightPanelBody"></div>
    </aside>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <div id="modalContainer"></div>

  <nav id="bottomNav" class="bottom-nav">
    <a href="#chat" class="bottom-nav-item" data-page="chat"><span class="bottom-nav-icon">💬</span><span class="bottom-nav-label">Chat</span></a>
    <a href="#dashboard" class="bottom-nav-item" data-page="dashboard"><span class="bottom-nav-icon">◉</span><span class="bottom-nav-label">Home</span></a>
    <a href="#skills" class="bottom-nav-item" data-page="skills"><span class="bottom-nav-icon">⚡</span><span class="bottom-nav-label">Skills</span></a>
    <a href="#kanban" class="bottom-nav-item" data-page="kanban"><span class="bottom-nav-icon">📌</span><span class="bottom-nav-label">Board</span></a>
    <a href="#errors" class="bottom-nav-item" data-page="errors"><span class="bottom-nav-icon">⚠</span><span class="bottom-nav-label">Errors</span></a>
  </nav>

  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script src="voice.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
